[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

#Opciones que se ejecutan automaticamente.
addopts = -v --html=report.html --self-contained-html

markers =
    smoke: pruebas criticas del sistema
    regression: pruebas de regression
    api: pruebas de api
    ui: pruebas de interfaz
